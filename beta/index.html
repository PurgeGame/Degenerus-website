<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Degenerus Beta</title>
  <link rel="stylesheet" href="/shared/nav.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/panels.css">
  <link rel="stylesheet" href="styles/buttons.css">
  <link rel="stylesheet" href="styles/forms.css">
  <link rel="stylesheet" href="styles/tx-status.css">
  <link rel="stylesheet" href="styles/purchase.css">
  <link rel="stylesheet" href="styles/status-bar.css">
  <script type="importmap">
  {
    "imports": {
      "ethers": "https://esm.sh/ethers@6.16",
      "gsap": "https://esm.sh/gsap@3.14",
      "gsap/Flip": "https://esm.sh/gsap@3.14/Flip",
      "gsap/TextPlugin": "https://esm.sh/gsap@3.14/TextPlugin",
      "canvas-confetti": "https://esm.sh/canvas-confetti@1.9"
    }
  }
  </script>
</head>
<body>
  <div class="container">
    <!-- Nav injected by shared/nav.js -->

    <!-- Connect prompt (Custom Element, registered in Plan 03) -->
    <connect-prompt></connect-prompt>

    <!-- Page Header -->
    <header class="page-header">
      <img class="page-header-logo" src="/badges-circular/flame_red.svg" alt="Degenerus">
      <h1>DEGENERUS BETA</h1>
      <p class="subtitle">Buy tickets, open luckboxes, and claim passes. Real contracts, real ETH.</p>
    </header>

    <!-- Status Bar (Custom Element, registered in Phase 6 Plan 03) -->
    <game-status-bar></game-status-bar>

    <!-- Phase-dependent panels -->
    <div data-panel="purchase" class="main-layout">
      <div>
        <purchase-panel></purchase-panel>
      </div>
      <div>
        <tx-status-list></tx-status-list>
      </div>
    </div>

    <div data-panel="jackpot" class="main-layout" hidden>
      <!-- Jackpot display content added in Phase 8 -->
      <div class="panel"><p class="text-dim">Jackpot display (Phase 8)</p></div>
    </div>

    <div data-panel="gameover" class="main-layout" hidden>
      <!-- GAMEOVER terminal info added in Phase 10 -->
      <div class="panel"><p class="text-dim">Game Over (Phase 10)</p></div>
    </div>

    <!-- Stale data indicator -->
    <div id="stale-indicator" class="stale-indicator" hidden>
      Data may be outdated. Reconnecting...
    </div>

    <footer>
      <p>Degenerus Protocol Beta -- Testnet</p>
    </footer>
  </div>

  <!-- Dev server required. Run: python3 -m http.server 8080 -->
  <!-- file:// will NOT work due to ES module CORS restrictions -->

  <script src="/shared/nav.js"></script>
  <script>initNav({ currentPage: 'beta' });</script>
  <script type="module" src="app/main.js"></script>
</body>
</html>
