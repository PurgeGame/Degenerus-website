<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Degenerus Beta</title>
  <link rel="stylesheet" href="/shared/nav.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/panels.css">
  <link rel="stylesheet" href="styles/buttons.css">
  <link rel="stylesheet" href="styles/forms.css">
  <link rel="stylesheet" href="styles/tx-status.css">
  <link rel="stylesheet" href="styles/purchase.css">
  <link rel="stylesheet" href="styles/passes.css">
  <link rel="stylesheet" href="styles/status-bar.css">
  <link rel="stylesheet" href="styles/death-clock.css">
  <link rel="stylesheet" href="styles/jackpot.css">
  <link rel="stylesheet" href="styles/coinflip.css">
  <link rel="stylesheet" href="styles/degenerette.css">
  <link rel="stylesheet" href="styles/quests.css">
  <link rel="stylesheet" href="styles/claims.css">
  <link rel="stylesheet" href="styles/affiliate.css">
  <link rel="stylesheet" href="styles/baf.css">
  <link rel="stylesheet" href="styles/decimator.css">
  <link rel="stylesheet" href="styles/terminal.css">
  <link rel="stylesheet" href="styles/skeleton.css">
  <link rel="stylesheet" href="styles/replay.css">
  <link rel="stylesheet" href="styles/boons.css">
  <script type="importmap">
  {
    "imports": {
      "ethers": "https://esm.sh/ethers@6.16",
      "gsap": "https://esm.sh/gsap@3.14",
      "gsap/Flip": "https://esm.sh/gsap@3.14/Flip",
      "gsap/TextPlugin": "https://esm.sh/gsap@3.14/TextPlugin",
      "canvas-confetti": "https://esm.sh/canvas-confetti@1.9"
    }
  }
  </script>
</head>
<body>
  <div class="container">
    <!-- Nav injected by shared/nav.js -->

    <!-- Page Header -->
    <header class="page-header">
      <img class="page-header-logo" src="/badges-circular/flame_red.svg" alt="Degenerus">
      <h1>DEGENERUS BETA</h1>
      <p class="subtitle">Historical jackpot replay viewer.</p>
    </header>

    <!-- Historical status bar: shows day + level for the replay panel's selected day -->
    <game-status-bar></game-status-bar>

    <!-- Active boons for the connected player on the current (replay) day -->
    <boons-panel></boons-panel>

    <!-- Jackpot Replay panel -->
    <replay-panel></replay-panel>

    <!-- Stale data indicator -->
    <div id="stale-indicator" class="stale-indicator" hidden>
      Data may be outdated. Reconnecting...
    </div>

    <footer>
      <p>Degenerus Protocol Beta -- Testnet</p>
    </footer>
  </div>

  <!-- Dev server required. Run: python3 -m http.server 8080 -->
  <!-- file:// will NOT work due to ES module CORS restrictions -->

  <script src="/shared/nav.js"></script>
  <script>initNav({ currentPage: 'beta' });</script>
  <script type="module" src="app/main.js"></script>
</body>
</html>
