<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackpot Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: #14141a;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- Demo widget styles ---- */

    .demo-wrap {
      background: #14141a;
      border-radius: 12px;
      padding: 1.5rem 1rem 1rem;
      margin: 0 auto;
      max-width: 380px;
      width: 100%;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }
    .demo-wrap * { box-sizing: border-box; }

    .demo-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #f5a623;
      margin-bottom: 0.15rem;
      letter-spacing: 0.03em;
    }
    .demo-scenario {
      font-size: 0.72rem;
      color: #aaa;
      margin-bottom: 0.8rem;
      height: 3.1em;
      line-height: 1.4;
      overflow: hidden;
    }

    /* Token grid */
    .demo-token-wrap { display: flex; justify-content: center; }
    .demo-token {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 300px;
      height: 300px;
      position: relative;
      background: #d9d9d9;
      border: 3px solid #8a8d8f;
      border-radius: 14px;
      overflow: hidden;
    }
    .demo-token::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      width: 2px; height: 100%;
      background: #8a8d8f;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
    }
    .demo-token::after {
      content: '';
      position: absolute;
      top: 50%; left: 0;
      width: 100%; height: 2px;
      background: #8a8d8f;
      transform: translateY(-50%);
      z-index: 5;
      pointer-events: none;
    }

    /* Quadrants */
    .demo-quad {
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    .demo-quad.q-scratchable { background: #7ca8c4; }
    .demo-quad.q-has-trait { background: rgba(160, 200, 230, 0.65); }
    .demo-quad.q-has-tickets { background: rgba(22, 163, 74, 0.6); }
    .demo-quad.q-no-tickets { background: rgba(239, 120, 120, 0.5); }

    .demo-badge {
      object-fit: contain;
      width: 92%;
      height: 92%;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Scratch canvas */
    .demo-scratch-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      cursor: crosshair;
      touch-action: none;
    }

    /* Prize reveal overlay */
    .demo-prize-reveal {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .demo-prize-reveal.visible { opacity: 1; }
    .demo-prize-bar {
      padding: 4px 0;
      text-align: center;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
    }
    .demo-prize-bar .demo-prize-total {
      display: block;
      font-size: 0.65rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      line-height: 1.2;
    }

    /* Scattered win badges */
    .demo-badge-wrap {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      text-align: center;
    }
    .demo-scattered-badge {
      width: 100%;
      display: block;
      opacity: 0.85;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.25));
      object-fit: contain;
    }

    /* Center diamond */
    .demo-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: auto;
      cursor: pointer;
      width: 31%;
      height: 31%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .demo-center::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: calc(100% / 1.4142);
      height: calc(100% / 1.4142);
      background: #fff;
      border: 2px solid #8a8d8f;
      box-sizing: border-box;
      transform: translate(-50%, -50%) rotate(45deg);
      transition: background 0.4s ease, border-color 0.4s ease;
    }
    .demo-center.revealed::before {
      background: linear-gradient(135deg, #2a1a08, #3d2a10, #2a1a08);
      border-color: #c9943a;
    }
    .demo-wrap.center-win-mode .demo-center.revealed::before {
      background: linear-gradient(135deg, #003087, #046A38, #003087);
      border-color: #8a8d8f;
    }
    .demo-flame {
      position: relative;
      width: 66%;
      height: 66%;
      object-fit: contain;
      z-index: 1;
    }
    .demo-center.spinning .demo-flame {
      animation: demo-flame-pulse 0.6s ease-in-out infinite;
    }
    @keyframes demo-flame-pulse {
      0%, 100% { filter: brightness(1) sepia(0) saturate(1) hue-rotate(0deg); }
      50% { filter: brightness(1.4) sepia(1) saturate(5) hue-rotate(-30deg); }
    }

    /* Center scratch canvas */
    .demo-center-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 5;
      display: none;
      cursor: pointer;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }
    .demo-center-prize {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      text-align: center;
      font-weight: 700;
      line-height: 1.2;
      display: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .demo-center-prize.visible { display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 1; }
    .demo-center-prize .ff-amount {
      font-size: 0.7rem;
      display: block;
      color: #fff;
      text-shadow: 0 0 8px rgba(245, 166, 35, 0.8), 0 1px 2px rgba(0,0,0,0.5);
      letter-spacing: 0.02em;
    }
    .demo-wrap.center-win-mode .demo-center-prize .ff-amount {
      text-shadow: 0 0 8px rgba(4, 106, 56, 0.8), 0 1px 2px rgba(0,0,0,0.5);
    }
    .demo-center-prize .ff-label {
      font-size: 0.48rem;
      color: rgba(255,255,255,0.7);
      display: block;
      margin-top: 1px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Hint text */
    .demo-hint {
      margin-top: 0.6rem;
      font-size: 0.68rem;
      color: #888;
      letter-spacing: 0.04em;
      height: 1.2em;
      overflow: hidden;
      transition: opacity 0.3s;
    }

    /* Next Day button */
    .demo-controls {
      margin-top: 0.8rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }
    .demo-next-btn {
      padding: 0.45rem 1.4rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      border: 1px solid #f5a623;
      border-radius: 6px;
      background: rgba(245, 166, 35, 0.15);
      color: #f5a623;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .demo-next-btn:hover {
      background: rgba(245, 166, 35, 0.3);
      transform: translateY(-1px);
    }
    .demo-next-btn:active { transform: translateY(0); }
    .demo-next-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ---- Jackpot Overview panel (Phase 37) ---- */
    .jackpot-overview {
      margin-top: 16px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: left;
    }
    .jackpot-overview-heading {
      font-size: 0.85rem;
      font-weight: 700;
      color: #f5a623;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .jo-subheading {
      font-size: 0.75rem;
      font-weight: 600;
      color: #cfd8e3;
      letter-spacing: 0.04em;
      margin: 6px 0 4px;
      text-transform: uppercase;
    }
    .jo-grid {
      display: grid;
      grid-template-columns: 28px 36px 44px 52px 44px 60px 1fr;
      gap: 0 4px;
      font-size: 0.75rem;
      width: 100%;
    }
    .jo-header {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #f5a623;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .jo-row { display: contents; }
    .jo-row > * {
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      font-variant-numeric: tabular-nums;
      color: #e0e0e0;
    }
    .jo-row:last-child > * { border-bottom: none; }
    .jo-type-badge img { width: 24px; height: 24px; object-fit: contain; }
    .jo-type-badge.jo-bonus {
      font-size: 0.62rem; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .jo-winners { color: #22c55e; font-weight: 700; }
    .jo-unique  { color: #888; }
    .jo-coin, .jo-tickets { color: #e0e0e0; }
    .jo-eth { color: #22c55e; font-weight: 700; }
    .jo-spread { display: flex; gap: 4px; align-items: center; }
    .jo-spread-bar {
      height: 8px; border-radius: 2px;
      background: rgba(245,166,35,0.3); flex: 1;
    }
    .jo-spread-bar.active { background: #f5a623; }
    .jo-far-future-note {
      margin-top: 8px; padding: 4px 8px;
      border-radius: 4px;
      background: rgba(245,166,35,0.10);
      border: 1px solid rgba(245,166,35,0.25);
      font-size: 0.62rem;
      color: rgba(255,255,255,0.6);
      font-style: italic;
    }
    .jo-empty, .jo-loading {
      font-size: 0.75rem; color: #888;
      text-align: center; padding: 16px 0;
    }
    .jo-loading { animation: jo-pulse 1.2s ease-in-out infinite; }
    @keyframes jo-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>

  </section>
</div>

  var currentDay = 0;

  var badgesRevealed = [[], [], [], []]; // per-badge tracking within each quadrant
  var quadPrizes = [false, false, false, false];
  var quadWinArrays = [[], [], [], []];
  var mouseIsDown = false;
  // Grid-based scratch coverage tracking (avoids double-counting overlapping strokes)
  var GRID_RES = 40; // 40x40 cells per quadrant
  var CENTER_GRID_RES = 20;
  var scratchGrids = [null, null, null, null];
  var centerScratchGrid = null;

  function makeScratchGrid(res) { return new Uint8Array(res * res); }

  function markGridCells(grid, res, canvasW, canvasH, cx, cy, brushR) {
    // Map canvas coords to grid coords and mark cells within brush radius
    var cellW = canvasW / res, cellH = canvasH / res;
    var gridCX = cx / cellW, gridCY = cy / cellH;
    var gridR = brushR / Math.min(cellW, cellH);
    var minGX = Math.max(0, Math.floor(gridCX - gridR));
    var maxGX = Math.min(res - 1, Math.ceil(gridCX + gridR));
    var minGY = Math.max(0, Math.floor(gridCY - gridR));
    var maxGY = Math.min(res - 1, Math.ceil(gridCY + gridR));
    for (var gy = minGY; gy <= maxGY; gy++) {
      for (var gx = minGX; gx <= maxGX; gx++) {
        var dx = gx + 0.5 - gridCX, dy = gy + 0.5 - gridCY;
        if (dx * dx + dy * dy <= gridR * gridR) {
          grid[gy * res + gx] = 1;
        }
      }
    }
  }

  function gridCoverage(grid) {
    var cleared = 0;
    for (var i = 0; i < grid.length; i++) { if (grid[i]) cleared++; }
    return cleared / grid.length;
  }

  var rollPhase       = 'idle';   // 'idle' | 'roll1' | 'roll2' | 'done'
  var playerData      = null;     // last pre-flight response

  var pendingRoll2    = false;    // true when Roll 2 data should source the next animate()

  // ---- Badge path helper ----
  function badgePath(q, sym, col) {
    var cat = CATEGORIES[q];
    var idx = cat === 'cards' ? CARD_IDX[sym] : sym;
    return '/badges-circular/' + cat + '_0' + idx + '_' + SYMBOLS[cat][sym] + '_' + COLORS[col] + '.svg';
  }

  function randomTrait() {

  // ---- Sound effects (Web Audio) ----
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function sfxTick(lockCount) {
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 400 + (lockCount / 8) * 500;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.06, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.06);
  }

  function sfxLock(owned) {
    var ctx = getAudio();
    if (owned) {
      var o1 = ctx.createOscillator(), g1 = ctx.createGain();
      o1.connect(g1); g1.connect(ctx.destination);
      o1.frequency.value = 660; o1.type = 'sine';
      g1.gain.setValueAtTime(0.12, ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 0.15);
      var o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 880; o2.type = 'sine';
      g2.gain.setValueAtTime(0.12, ctx.currentTime + 0.08);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
      o2.start(ctx.currentTime + 0.08); o2.stop(ctx.currentTime + 0.22);
    } else {
      var osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(180, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.12);
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
    }
  }

  function sfxAllLocked(anyOwned) {
    var ctx = getAudio();
    if (anyOwned) {
      var o1 = ctx.createOscillator(), g1 = ctx.createGain();
      o1.connect(g1); g1.connect(ctx.destination);
      o1.frequency.setValueAtTime(200, ctx.currentTime);
      o1.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.15);
      o1.type = 'sine';
      g1.gain.setValueAtTime(0.18, ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 0.2);
      var o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 1320; o2.type = 'sine';
      g2.gain.setValueAtTime(0.06, ctx.currentTime + 0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o2.start(ctx.currentTime + 0.05); o2.stop(ctx.currentTime + 0.5);
    } else {
      var o1 = ctx.createOscillator(), g1 = ctx.createGain();
      o1.connect(g1); g1.connect(ctx.destination);
      o1.frequency.setValueAtTime(120, ctx.currentTime);
      o1.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);
      o1.type = 'sawtooth';
      g1.gain.setValueAtTime(0.1, ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 0.35);
    }
  }

  function sfxScratchStart() {
    if (scratchNode) return;
    var ctx = getAudio();
    var buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    var noise = ctx.createBufferSource();
    var filter = ctx.createBiquadFilter();
    var gain = ctx.createGain();
    noise.buffer = buf; noise.loop = true;
    filter.type = 'bandpass'; filter.frequency.value = 3000; filter.Q.value = 0.5;
    noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    gain.gain.value = 0.04;
    noise.start();
    scratchNode = { noise: noise, gain: gain };
  }

  function sfxScratchStop() {
    if (!scratchNode) return;
    try { scratchNode.noise.stop(); } catch (e) {}
    scratchNode = null;
  }

  function sfxGreenReveal() {
    var ctx = getAudio();
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.05);
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
  }

  function sfxReveal(isWin) {
    var ctx = getAudio();
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (isWin) {
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + 0.25);
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
    } else {
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.setValueAtTime(349, ctx.currentTime + 0.2);
      osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.6);
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.setValueAtTime(0.1, ctx.currentTime + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
    }
  }

  function sfxFanfare() {
    var ctx = getAudio();
    var notes = [523, 659, 784, 1047];
    for (var i = 0; i < notes.length; i++) {
      (function (freq, delay) {
        var osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + delay + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.4);
        osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.4);
      })(notes[i], i * 0.12);
    }
  }

  // ---- DOM helpers ----
  function $(id) { return document.getElementById(id); }

  function getCanvas(qi) { return document.querySelector('#demo-token .demo-scratch-canvas[data-q="' + qi + '"]'); }

  // ---- Prize display ----
  function formatWin(amount, type) {
    if (type === 'burnie') {
      if (amount >= 1000) return Math.round(amount).toLocaleString() + ' BURNIE';
      if (amount >= 1) return amount.toFixed(2).replace(/\.?0+$/, '') + ' BURNIE';
      return amount.toFixed(4).replace(/\.?0+$/, '') + ' BURNIE';
    }
    if (type === 'tickets') return amount + ' ticket' + (amount !== 1 ? 's' : '');
    var s;
    if (amount >= 1) s = amount.toFixed(2);
    else if (amount >= 0.01) s = amount.toFixed(4);
    else s = amount.toFixed(6);
    return s.replace(/\.?0+$/, '') + ' ETH';
  }

  function summarizeWins(wins) {
    var totals = {};
    var ticketsByLevel = {};
    for (var i = 0; i < wins.length; i++) {
      var type = wins[i][1];
      if (!totals[type]) totals[type] = 0;
      totals[type] += wins[i][0];
      if (type === 'tickets' && wins[i].length > 3) {
        var lv = wins[i][3];
        if (!ticketsByLevel[lv]) ticketsByLevel[lv] = 0;
        ticketsByLevel[lv] += wins[i][0];
      }
    }
    var lines = [];
    if (totals.eth) lines.push(formatWin(totals.eth, 'eth'));
    if (totals.burnie) lines.push(formatWin(totals.burnie, 'burnie'));
    var lvKeys = Object.keys(ticketsByLevel).sort(function (a, b) { return a - b; });
    if (lvKeys.length > 0) {
      for (var li = 0; li < lvKeys.length; li++) {
        lines.push(ticketsByLevel[lvKeys[li]] + ' tix \u2192 L' + lvKeys[li]);
      }
    } else if (totals.tickets) {
      lines.push(formatWin(totals.tickets, 'tickets'));
    }
    return lines;
  }

  function distributePrizes(scenario) {
    var counts = [0, 0, 0, 0];
    var winArrays = [[], [], [], []];
    var regular = [];
    centerWins = [];
    for (var i = 0; i < scenario.prizes.length; i++) {
      if (scenario.prizes[i][2] === -2) {
        centerWins.push(scenario.prizes[i]);
      } else {
        regular.push(scenario.prizes[i]);
      }
    }
    if (scenario.centerWins) {
      for (var i = 0; i < scenario.centerWins.length; i++) {
        centerWins.push(scenario.centerWins[i]);
      }
    }
    for (var i = 0; i < regular.length; i++) {
      var q = regular[i][2];
      if (q >= 0 && q <= 3) {
        counts[q]++;
        winArrays[q].push(regular[i]);
      }
    }
    for (var i = 0; i < 4; i++) {
      quadPrizes[i] = counts[i] > 0;
      quadWinArrays[i] = winArrays[i];
    }
  }

  function placeWinBadges(qIdx) {
    var quad = getQuads()[qIdx];
    var wins = quadWinArrays[qIdx];
    if (!wins || wins.length <= 0) return;
    var sym = finalTicket ? finalTicket[qIdx].sym : 0;
    var col = finalTicket ? finalTicket[qIdx].col : 0;
    var path = badgePath(qIdx, sym, col);
    var count = wins.length;
    var maxSize, minSize;
    if (count === 1) { minSize = 30; maxSize = 65; }
    else if (count <= 3) { minSize = 25; maxSize = 50; }
    else { minSize = 20; maxSize = 40; }

    var placed = [];
    var allBounds = [];
    for (var w = 0; w < wins.length; w++) {
      var sizePct = minSize + (w / Math.max(1, wins.length - 1)) * (maxSize - minSize);
      if (wins.length === 1) sizePct = maxSize;
      var bestLeft = null, bestTop = null, bestOverlap = Infinity;
      for (var a = 0; a < 50; a++) {
        var tryLeft = Math.random() * (100 - sizePct);
        var tryTop = Math.random() * (90 - sizePct);
        var tryCX = tryLeft + sizePct / 2;
        var tryCY = tryTop + sizePct / 2;
        var overlap = 0;
        for (var p = 0; p < placed.length; p++) {
          var dx = tryCX - placed[p].cx, dy = tryCY - placed[p].cy;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var minDist = (sizePct + placed[p].size) / 2;
          if (dist < minDist) overlap += minDist - dist;
        }
        if (overlap < bestOverlap) { bestOverlap = overlap; bestLeft = tryLeft; bestTop = tryTop; }
        if (overlap === 0) break;
      }
      placed.push({ cx: bestLeft + sizePct / 2, cy: bestTop + sizePct / 2, size: sizePct });
      allBounds.push({ left: bestLeft, top: bestTop, right: bestLeft + sizePct, bottom: bestTop + sizePct });
      var wrap = document.createElement('div');
      wrap.className = 'demo-badge-wrap';
      wrap.style.width = sizePct + '%';
      wrap.style.left = bestLeft + '%';
      wrap.style.top = bestTop + '%';
      var img = document.createElement('img');
      img.src = path; img.className = 'demo-scattered-badge'; img.alt = '';
      wrap.appendChild(img);
      quad.appendChild(wrap);
    }
    var circles = [];
    for (var b = 0; b < allBounds.length; b++) {
      var bb = allBounds[b];
      circles.push({ cx: (bb.left + bb.right) / 2, cy: (bb.top + bb.bottom) / 2, r: (bb.right - bb.left) / 2 });
    }
    quadBadgeBounds[qIdx] = circles;
  }

  // ---- Canvas scratch ----
  function drawCover(canvas) {
    var ctx = canvas.getContext('2d');
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    var grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#d0d0d0'); grad.addColorStop(0.3, '#c8c8c8');
    grad.addColorStop(0.6, '#b0b0b0'); grad.addColorStop(1, '#c0c0c0');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    ctx.globalAlpha = 0.07;
    for (var y = 0; y < h; y += 4) {
      ctx.strokeStyle = (y % 8 === 0) ? '#fff' : '#888';
      ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawBadgeCover(canvas, badgeSrc) {
    var ctx = canvas.getContext('2d');
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#b8d4e8';
    ctx.fillRect(0, 0, w, h);
    var img = new Image();
    img.onload = function () {
      var size = Math.min(w, h) * 0.92;
      var x = (w - size) / 2, y = (h - size) / 2;
      ctx.drawImage(img, x, y, size, size);
    };
    img.src = badgeSrc;
  }

  function initCanvas(canvas) {
    var quad = canvas.parentElement;
    var rect = quad.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    drawCover(canvas);
  }

  function initCanvasWithBadge(canvas, badgeSrc) {
    var quad = canvas.parentElement;
    var rect = quad.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    drawBadgeCover(canvas, badgeSrc);
  }

  function scratchAt(canvas, cx, cy) {
    var dpr = window.devicePixelRatio || 1;
    var r = BRUSH_R * dpr;
    var ctx = canvas.getContext('2d');
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }

  function clearedFraction(canvas) {
    var ctx = canvas.getContext('2d');
    var data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    var total = canvas.width * canvas.height;
    var cleared = 0;
    for (var i = 3; i < data.length; i += 4) { if (data[i] < 20) cleared++; }
    return cleared / total;
  }

  function revealQuadrant(qIdx) {
    if (scratched[qIdx]) return;
    scratched[qIdx] = true;
    sfxScratchStop();
    var canvas = getCanvas(qIdx);
    var prize = getPrize(qIdx);
    canvas.style.transition = 'opacity 0.35s ease';
    canvas.style.opacity = '0';
    canvas.style.pointerEvents = 'none';
    var isWin = quadPrizes[qIdx];
    sfxReveal(isWin);
    var quad = getQuads()[qIdx];
    quad.classList.remove('q-scratchable');
    if (isWin) {
      quad.classList.add('q-has-tickets');
    } else {
      quad.classList.add('q-no-tickets');
      var mainBadge = quad.querySelector('.demo-badge');
      if (mainBadge) mainBadge.style.display = '';
    }
    if (prize && isWin) {
      var lines = summarizeWins(quadWinArrays[qIdx]);
      prize.innerHTML = '<div class="demo-prize-bar">' +
        lines.map(function (l) { return '<span class="demo-prize-total">' + l + '</span>'; }).join('') +
        '</div>';
      prize.classList.remove('visible');
      setTimeout(function () { prize.classList.add('visible'); }, 200);
    }
    checkAllScratched();
  }

  // ---- Center scratch ----
  function hideCenterScratch() {
    var canvas = $('demo-center-canvas');
    var prize = $('demo-center-prize');
    var flame = document.querySelector('.demo-flame');
    var center = $('demo-center');
    if (canvas) { canvas.style.display = 'none'; canvas.style.opacity = '1'; canvas.style.pointerEvents = 'auto'; }

  function setCenterWinMode(enabled) {
    var wrap = $('demo-wrap');
    if (!wrap) return;
    wrap.classList.toggle('center-win-mode', !!enabled);
  }

  function showCenterScratch() {
    var canvas = $('demo-center-canvas');
    if (!canvas) return;
    var center = canvas.parentElement;
    var wrap = $('demo-wrap');
    var isDegeneretteWinCenter = !!(wrap && wrap.classList.contains('center-win-mode'));
    var rect = center.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    var flame = document.querySelector('.demo-flame');
    if (flame) flame.style.display = 'none';

    var ctx = canvas.getContext('2d');
    var w = canvas.width, h = canvas.height;
    if (isDegeneretteWinCenter) {
      // Resolved Day 4 center uses Degenerette win-center palette
      ctx.fillStyle = '#003087';
      ctx.fillRect(0, 0, w, h);
      var winGrad = ctx.createRadialGradient(w * 0.5, h * 0.5, w * 0.08, w * 0.5, h * 0.5, w * 0.65);
      winGrad.addColorStop(0, 'rgba(4, 106, 56, 0.42)');
      winGrad.addColorStop(1, 'rgba(4, 106, 56, 0)');
      ctx.fillStyle = winGrad;
      ctx.fillRect(0, 0, w, h);
    } else {
      // Default center scratch palette
      ctx.fillStyle = '#0a1e1a';
      ctx.fillRect(0, 0, w, h);
    }

    // Draw flame tint based on current example
    var img = new Image();
    img.onload = function () {
      // Flame SVG viewBox is 38x54 (portrait) -- preserve aspect ratio
      var svgRatio = 38 / 54;
      var maxSize = Math.min(w, h) * 0.7;
      var drawW = maxSize * svgRatio;
      var drawH = maxSize;
      if (isDegeneretteWinCenter) {
        ctx.filter = 'brightness(0) saturate(100%) invert(52%) sepia(79%) saturate(594%) hue-rotate(83deg) brightness(93%) contrast(96%)';
      } else {
        ctx.filter = 'sepia(1) saturate(3) hue-rotate(120deg) brightness(1.4)';
      }
      ctx.drawImage(img, (w - drawW) / 2, (h - drawH) / 2, drawW, drawH);
      ctx.filter = 'none';
    };
    img.src = '/specials/special_none.svg';
    canvas.style.display = 'block';
  }

  function revealCenter() {
    if (centerScratched || centerWins.length === 0) return;
    centerScratched = true;
    sfxGreenReveal();
    var canvas = $('demo-center-canvas');
    var prize = $('demo-center-prize');
    // Darken diamond background so prize text is readable
    var center = $('demo-center');
    if (center) center.classList.add('revealed');
    if (canvas) {
      canvas.style.transition = 'opacity 0.35s ease';
      canvas.style.opacity = '0';
      canvas.style.pointerEvents = 'none';
    }
    if (prize) {
      var totalBurnie = 0;
      var levels = [];
      for (var i = 0; i < centerWins.length; i++) {
        totalBurnie += centerWins[i][0];
        if (centerWins[i].length > 3 && levels.indexOf(centerWins[i][3]) === -1) levels.push(centerWins[i][3]);
      }
      var amountStr = formatWin(totalBurnie, 'burnie');
      var levelStr = levels.length > 0 ? 'L' + levels.sort(function (a, b) { return a - b; }).join(', L') : 'Far Future';
      prize.innerHTML = '<span class="ff-amount">' + amountStr + '</span><span class="ff-label">' + levelStr + '</span>';
      prize.style.display = 'block';
      prize.classList.remove('visible');
      setTimeout(function () { prize.classList.add('visible'); }, 200);
    }
    checkAllScratched();
  }

  function checkAllScratched() {
    var centerPending = centerWins.length > 0 && !centerScratched;
    var all = scratched[0] && scratched[1] && scratched[2] && scratched[3] && !centerPending;
    var hint = $('demo-hint');
    if (all) {
      if (hint) hint.textContent = '';
      if (hasTicketsState) sfxFanfare();
    } else {
      var remaining = scratched.filter(function (s) { return !s; }).length;
      if (centerPending) remaining++;
      if (hint) hint.textContent = remaining + ' area' + (remaining !== 1 ? 's' : '') + ' left to scratch';
    }
  }

  // ---- Scratch event wiring ----
  function getCanvasPos(canvas, clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    return { x: (clientX - rect.left) * dpr, y: (clientY - rect.top) * dpr };
  }

  function wireCanvas(canvas, qIdx) {
    var lastPos = null;
    function onScratch(cx, cy) {
      if (scratched[qIdx]) return;
      sfxScratchStart();
      var dpr = window.devicePixelRatio || 1;
      var brushR = BRUSH_R * dpr;
      scratchAt(canvas, cx, cy);
      if (!scratchGrids[qIdx]) scratchGrids[qIdx] = makeScratchGrid(GRID_RES);
      markGridCells(scratchGrids[qIdx], GRID_RES, canvas.width, canvas.height, cx, cy, brushR);
      if (quadPrizes[qIdx] && quadBadgeBounds[qIdx]) {
        var pctX = (cx / canvas.width) * 100;
        var pctY = (cy / canvas.height) * 100;
        var circles = quadBadgeBounds[qIdx];
        for (var ci = 0; ci < circles.length; ci++) {
          if (badgesRevealed[qIdx].indexOf(ci) !== -1) continue;
          var ddx = pctX - circles[ci].cx, ddy = pctY - circles[ci].cy;
          if (ddx * ddx + ddy * ddy <= circles[ci].r * circles[ci].r) {
            badgesRevealed[qIdx].push(ci);
            sfxGreenReveal();
            if (!greenRevealed[qIdx]) {
              greenRevealed[qIdx] = true;
              var quad = getQuads()[qIdx];
              quad.classList.remove('q-scratchable');
              quad.classList.add('q-has-tickets');
            }
          }
        }
      }
      if (lastPos) {
        var dx = cx - lastPos.x, dy = cy - lastPos.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var steps = Math.max(1, Math.floor(dist / 4));
        for (var s = 1; s < steps; s++) {
          var ix = lastPos.x + dx * s / steps, iy = lastPos.y + dy * s / steps;
          scratchAt(canvas, ix, iy);
          markGridCells(scratchGrids[qIdx], GRID_RES, canvas.width, canvas.height, ix, iy, brushR);
        }
      }
      lastPos = { x: cx, y: cy };
      if (gridCoverage(scratchGrids[qIdx]) >= REVEAL_THRESHOLD) {
        revealQuadrant(qIdx);
      }
    }
    canvas.addEventListener('mousemove', function (e) {
      if (scratched[qIdx]) return;
      var p = getCanvasPos(canvas, e.clientX, e.clientY);
      onScratch(p.x, p.y);
    });
    canvas.addEventListener('mouseleave', function () { lastPos = null; sfxScratchStop(); });
    canvas.addEventListener('touchstart', function (e) {
      if (scratched[qIdx]) return;
      e.preventDefault(); lastPos = null;
      var t = e.touches[0], p = getCanvasPos(canvas, t.clientX, t.clientY);
      onScratch(p.x, p.y);
    }, { passive: false });
    canvas.addEventListener('touchmove', function (e) {
      if (scratched[qIdx]) return;
      e.preventDefault();
      var t = e.touches[0], p = getCanvasPos(canvas, t.clientX, t.clientY);
      onScratch(p.x, p.y);
    }, { passive: false });
    canvas.addEventListener('touchend', function () { lastPos = null; sfxScratchStop(); });
  }

  // Wire center scratch
  function wireCenterCanvas() {
    var canvas = $('demo-center-canvas');
    if (!canvas) return;
    var lastPos = null;
    function onScratch(cx, cy) {
      if (centerScratched) return;
      sfxScratchStart();

      markGridCells(centerScratchGrid, CENTER_GRID_RES, canvas.width, canvas.height, cx, cy, brushR);
      if (lastPos) {
        var dx = cx - lastPos.x, dy = cy - lastPos.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var steps = Math.max(1, Math.floor(dist / 4));
        for (var s = 1; s < steps; s++) {
          var ix = lastPos.x + dx * s / steps, iy = lastPos.y + dy * s / steps;
          scratchAt(canvas, ix, iy);
          markGridCells(centerScratchGrid, CENTER_GRID_RES, canvas.width, canvas.height, ix, iy, brushR);
        }
      }
      lastPos = { x: cx, y: cy };
      if (gridCoverage(centerScratchGrid) >= 0.5) {

    }
    canvas.addEventListener('mousemove', function (e) {
      if (centerScratched) return;
      var p = getCanvasPos(canvas, e.clientX, e.clientY);
      onScratch(p.x, p.y);
    });
    canvas.addEventListener('mouseleave', function () { lastPos = null; sfxScratchStop(); });
    canvas.addEventListener('touchstart', function (e) {
      if (centerScratched) return;
      e.preventDefault(); lastPos = null;
      var t = e.touches[0], p = getCanvasPos(canvas, t.clientX, t.clientY);
      onScratch(p.x, p.y);
    }, { passive: false });
    canvas.addEventListener('touchmove', function (e) {
      if (centerScratched) return;
      e.preventDefault();
      var t = e.touches[0], p = getCanvasPos(canvas, t.clientX, t.clientY);
      onScratch(p.x, p.y);
    }, { passive: false });
    canvas.addEventListener('touchend', function () { lastPos = null; sfxScratchStop(); });

  // ---- Spin animation ----
  function animate(scenario) {
    var myId = ++animId;
    spinning = true;
    $('demo-next-btn').disabled = true;
    var target = scenario.target;
    var lockedColors = [false, false, false, false];
    var lockedSymbols = [false, false, false, false];
    var locksDone = 0;
    var totalLocks = 8;
    var idleCount = 2 + Math.floor(Math.random() * 3);
    var hasTickets = !scenario.noTickets;

    quadOwned = scenario.owned.slice();
    hasTicketsState = hasTickets;
    scratched = [false, false, false, false];
    greenRevealed = [false, false, false, false];
    badgesRevealed = [[], [], [], []];
    quadBadgeBounds = [null, null, null, null];
    centerWins = [];
    centerScratched = false;
    scratchGrids = [null, null, null, null];
    centerScratchGrid = null;
    setCenterWinMode(false);
    hideCenterScratch();
    clearColors();
    sfxScratchStop();

    var flameCenter = $('demo-center');
    if (flameCenter) flameCenter.classList.add('spinning');

    if (hasTickets) distributePrizes(scenario);

    // Reset canvases and prizes
    var hint = $('demo-hint');
    if (hint) hint.textContent = '';
    clearScatteredBadges();
    var mainBadges = document.querySelectorAll('#demo-token .demo-badge');
    for (var mb = 0; mb < mainBadges.length; mb++) mainBadges[mb].style.display = '';

    var quads = getQuads();
    for (var i = 0; i < 4; i++) {
      var canvas = getCanvas(i);
      canvas.style.transition = 'none';
      canvas.style.opacity = '0';
      canvas.style.pointerEvents = 'none';
      var prize = getPrize(i);
      if (prize) { prize.classList.remove('visible'); prize.innerHTML = ''; }
    }

    function step() {
      if (myId !== animId) return;
      sfxTick(locksDone);
      var display = [];
      for (var i = 0; i < 4; i++) {
        var r = randomTrait();
        display.push({
          q: i,
          sym: lockedSymbols[i] ? target[i].sym : r.sym,
          col: lockedColors[i] ? target[i].col : r.col
        });
      }
      renderBadges(display);
      for (var i = 0; i < 4; i++) {
        quads[i].classList.remove('q-has-trait', 'q-no-tickets');
        if (lockedSymbols[i]) {
          quads[i].classList.add(quadOwned[i] ? 'q-has-trait' : 'q-no-tickets');
        } else {
          quads[i].classList.add(Math.random() < 0.5 ? 'q-has-trait' : 'q-no-tickets');
        }
      }
      if (idleCount <= 0 && locksDone < totalLocks) {
        var available = [];
        for (var q = 0; q < 4; q++) {
          if (!lockedColors[q]) available.push({ q: q, type: 'color' });
          else if (!lockedSymbols[q]) available.push({ q: q, type: 'symbol' });
        }
        if (available.length > 0) {
          var pick = available[Math.floor(Math.random() * available.length)];
          if (pick.type === 'color') lockedColors[pick.q] = true;
          else lockedSymbols[pick.q] = true;
          locksDone++;
          if (pick.type === 'symbol') sfxLock(quadOwned[pick.q]);
          else sfxTick(locksDone);
          idleCount = 2 + Math.floor(Math.random() * 3);
        }
      } else {
        idleCount--;
      }
      if (locksDone >= totalLocks) {
        var anyOwned = quadOwned[0] || quadOwned[1] || quadOwned[2] || quadOwned[3];
        sfxAllLocked(anyOwned);
        renderBadges(target);
        finalTicket = target;
        afterSpin(scenario);
        return;
      }
      var delay = 80 + Math.floor((locksDone / totalLocks) * 120);
      setTimeout(step, delay);
    }
    step();
  }

  function afterSpin(scenario) {
    var quads = getQuads();
    var hint = $('demo-hint');
    var hasTickets = !scenario.noTickets;
    var flameCenter = $('demo-center');
    if (flameCenter) flameCenter.classList.remove('spinning');
    spinning = false;
    $('demo-scenario').textContent = scenario.desc;

    if (!hasTickets) {
      scratched = [true, true, true, true];
      for (var i = 0; i < 4; i++) {
        quads[i].classList.remove('q-has-trait');
        quads[i].classList.add('q-no-tickets');
      }
      if (hint) hint.textContent = 'No tickets for this level';
      $('demo-next-btn').disabled = false;
      return;
    }

    var anyOwned = false;
    for (var i = 0; i < 4; i++) {
      quads[i].classList.remove('q-has-trait');
      if (quadOwned[i]) {
        anyOwned = true;
        quads[i].classList.remove('q-no-tickets');
        quads[i].classList.add('q-scratchable');
        var canvas = getCanvas(i);
        var badgeSrc = quads[i].querySelector('.demo-badge').src;
        initCanvasWithBadge(canvas, badgeSrc);
        canvas.style.transition = 'none';
        canvas.style.opacity = '1';
        canvas.style.pointerEvents = 'auto';
      } else {
        scratched[i] = true;
        quads[i].classList.add('q-no-tickets');
      }
    }
    for (var i = 0; i < 4; i++) {
      if (quadOwned[i]) {
        var mainBadge = quads[i].querySelector('.demo-badge');
        mainBadge.style.display = 'none';
        if (quadPrizes[i]) placeWinBadges(i);
      }
    }
    if (centerWins.length > 0) {
      setCenterWinMode(!!scenario.degenWinCenter);
      showCenterScratch();
      anyOwned = true;
    }
    if (anyOwned) {
      if (hint) hint.textContent = 'Scratch to find your winners!';
    } else {
      if (hint) hint.textContent = 'No matching tickets this round';
    }
    // Enable next button after a short delay to let user scratch
    setTimeout(function () { $('demo-next-btn').disabled = false; }, 500);
  }

  // ---------- Phase 38: two-phase draw state machine ----------

  // Reset quadrant scratch state between Roll 1 and Roll 2 on the same day.
  // Mirrors the reset block at the top of animate() (lines ~1343-1350). DOES NOT
  // touch the spin-animation pipeline — it's invoked directly on Roll 1 -> Roll 2
  // transition so the scratch canvases come back fresh.
  function resetQuadrantScratchState() {
    scratched = [false, false, false, false];
    greenRevealed = [false, false, false, false];
    badgesRevealed = [[], [], [], []];
    quadPrizes = [false, false, false, false];
    quadWinArrays = [[], [], [], []];
    quadBadgeBounds = [null, null, null, null];
    scratchGrids = [null, null, null, null];
    centerScratchGrid = null;
    centerScratched = false;
    centerWins = [];
    // Clear canvases + prize-reveal overlays so they render empty again.
    var quads = getQuads();
    for (var i = 0; i < 4; i++) {
      var canvas = getCanvas(i);
      if (canvas) {
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.opacity = '0';
        canvas.style.pointerEvents = 'none';
      }
      var prize = getPrize(i);
      if (prize) { prize.classList.remove('visible'); prize.innerHTML = ''; }
      if (quads[i]) {
        quads[i].classList.remove('q-has-trait', 'q-no-tickets', 'q-scratchable', 'q-has-tickets');

      var cctx = centerCanvas.getContext('2d');
      cctx.clearRect(0, 0, centerCanvas.width, centerCanvas.height);
    }
    var centerPrize = $('demo-center-prize');
    if (centerPrize) { centerPrize.classList.remove('visible'); centerPrize.innerHTML = ''; }
  }

  // Transient "No bonus" button flash (no new DOM, no keyframes).

  // Pre-flight per-player fetch; stale-guarded via playerDataToken (mirrors joRenderToken).
  function preFlightAndRunDay(dayIdx) {
    var scenario = SCENARIOS[dayIdx];
    var addr  = scenario && scenario.player ? scenario.player : null;
    var level = dayIdx + 1;
    var token = ++playerDataToken;
    hideRoll2Panel();
    rollPhase = 'idle';
    currentReveal = 'roll1';

    function applyDataAndRun(data) {
      if (token !== playerDataToken) return; // superseded
      playerData = data;
      runDay(dayIdx);            // existing pipeline — sets scratch state, starts animate()
      renderJackpotOverview();   // Phase 37 pool-level panel refresh
      // NOTE: button label -> 'Roll' is set here; animate()/afterSpin ends with the
      // setTimeout(...,500) that re-enables the button; we override the label to 'Next'
      // in the state machine hook below once the reveal is settled.
      var btn = $('demo-next-btn');
      if (btn) btn.textContent = 'Roll';
    }

    if (!addr) {
      applyDataAndRun({ level: level, player: '', roll1Rows: [], roll2: { future: [], farFuture: [] }, hasBonus: false });
      return;
    }
    var url = joApiBase() + '/game/jackpot/' + level + '/player/' + addr;
    fetch(url).then(function (r) {
      if (!r.ok) return { level: level, player: addr, roll1Rows: [], roll2: { future: [], farFuture: [] }, hasBonus: false };
      return r.json();
    }).then(function (data) {
      applyDataAndRun(data || { level: level, player: addr, roll1Rows: [], roll2: { future: [], farFuture: [] }, hasBonus: false });
    }).catch(function () {
      applyDataAndRun({ level: level, player: addr, roll1Rows: [], roll2: { future: [], farFuture: [] }, hasBonus: false });
    });
  }

  // Phase 37 used setTimeout(...,500) after animate completes to re-enable the
  // button. We piggyback on that timing to flip the label to the next state.
  // Rather than edit afterSpin(), we observe the button's disabled-state flip
  // via a short poll kicked off from preFlightAndRunDay. Lightweight and
  // non-invasive. (Alternative: hook afterSpin — avoided to keep Phase 37
  // behavior byte-identical when player has no address.)
  function waitForRevealCompleteAndSetLabel() {
    var btn = $('demo-next-btn');
    if (!btn) return;
    var start = Date.now();
    function tick() {
      if (!spinning && !btn.disabled) {
        if (currentReveal === 'roll1') {
          btn.textContent = 'Next';
          rollPhase = 'roll1';
        } else if (currentReveal === 'roll2') {
          btn.textContent = 'Next Day \u2192';
          rollPhase = 'done';
        }
        currentReveal = null;
        return;
      }
      if (Date.now() - start > 30000) return; // safety timeout
      setTimeout(tick, 80);
    }
    setTimeout(tick, 80);
  }

  // Next Day / Roll / Next / Roll Bonus button — two-phase state machine.
  var started = false;
  $('demo-next-btn').addEventListener('click', function () {
    var btn = $('demo-next-btn');
    if (btn.disabled) return;      // Pitfall 2 guard
    if (spinning) return;
    getAudio();

    if (!started) {
      started = true;
      preFlightAndRunDay(0);
      waitForRevealCompleteAndSetLabel();
      return;
    }

    if (rollPhase === 'roll1') {
      // "Next" pressed — transition to Roll 2, or skip via flash.
      if (playerData && playerData.hasBonus) {
        resetQuadrantScratchState();
        renderRoll2Subsections(playerData.roll2);
        rollPhase = 'roll2';
        currentReveal = 'roll2';
        btn.textContent = 'Roll Bonus';
      } else {
        // Transient flash; set rollPhase to 'done' immediately so next click advances
        // the day cleanly even if pressed during the 500ms flash window (Pitfall 5).
        rollPhase = 'done';
        flashNoBonus(btn, 500);
      }
      return;
    }

    if (rollPhase === 'roll2') {
      // "Roll Bonus" pressed — reveal Roll 2. We reuse the scratch/spin system:
      // reveal is simulated by immediately showing the subsections (already rendered)
      // and setting label to "Next Day ->". No new animation, per CONTEXT.
      btn.textContent = 'Next Day \u2192';
      rollPhase = 'done';
      currentReveal = null;
      return;
    }

    if (rollPhase === 'done') {
      preFlightAndRunDay((currentDay + 1) % SCENARIOS.length);
      waitForRevealCompleteAndSetLabel();
      return;
    }

    // Fallback — advance day.
    preFlightAndRunDay((currentDay + 1) % SCENARIOS.length);
    waitForRevealCompleteAndSetLabel();
  });

  // ---------- Jackpot Overview panel (Phase 37) ----------

  var JO_CARD_IDX = [3, 4, 5, 6, 0, 2, 1, 7];
  var JO_CATEGORIES = ['crypto', 'zodiac', 'cards', 'dice'];
  var JO_SYMBOLS = {
    crypto: ['xrp','tron','sui','monero','solana','chainlink','ethereum','bitcoin'],
    zodiac: ['aries','taurus','gemini','cancer','leo','libra','sagittarius','aquarius'],
    cards:  ['club','diamond','heart','spade','horseshoe','cashsack','king','ace'],
    dice:   ['1','2','3','4','5','6','7','8']
  };
  var JO_COLORS = ['pink','purple','green','red','blue','orange','silver','gold'];

  function joBadgePath(quadrant, sym, col) {
    var cat = JO_CATEGORIES[quadrant];
    var idx = cat === 'cards' ? JO_CARD_IDX[sym] : sym;
    return '/badges-circular/' + cat + '_0' + idx + '_' + JO_SYMBOLS[cat][sym] + '_' + JO_COLORS[col] + '.svg';
  }

  // Format wei string to ETH with up to 4 decimals (no external BigNumber lib).
  function joFormatWeiToEth(weiStr) {
    if (!weiStr || weiStr === '0') return '0';
    var s = String(weiStr);
    if (s.length <= 18) {
      var pad = ('000000000000000000' + s).slice(-18).replace(/0+$/, '');
      return pad.length ? '0.' + pad.slice(0, 4) : '0';
    }
    var whole = s.slice(0, s.length - 18);
    var frac = s.slice(s.length - 18).replace(/0+$/, '').slice(0, 4);
    return frac.length ? whole + '.' + frac : whole;
  }

  function joFormatCoin(amtStr) {
    // BURNIE is 18-decimal; treat like ETH for display
    return joFormatWeiToEth(amtStr);
  }

  // Demo scenario currentDay (0-indexed) -> real API level.
  // Per UI-SPEC Open Question #2: demo days are 1-indexed in API.
  function joCurrentLevel() {
    return (typeof currentDay === 'number' ? currentDay : 0) + 1;
  }

  // Resolve API base. Relative path works when served from same origin.
  function joApiBase() {
    return (typeof window.JO_API_BASE === 'string' && window.JO_API_BASE) || '/beta/api';
  }

  var joRenderToken = 0; // guards against stale fetch responses

  function renderJackpotOverview() {
    var grid = document.getElementById('jo-grid');
    var status = document.getElementById('jo-status');
    var ffNote = document.getElementById('jo-far-future');
    if (!grid || !status) return;

    // Clear previous rows (keep .jo-header children)
    var children = Array.prototype.slice.call(grid.children);
    for (var i = 0; i < children.length; i++) {
      if (!children[i].classList.contains('jo-header')) grid.removeChild(children[i]);
    }
    if (ffNote) ffNote.style.display = 'none';
    status.className = 'jo-loading';
    status.textContent = 'Loading...';
    status.style.display = 'block';

    var token = ++joRenderToken;
    var level = joCurrentLevel();
    var url = joApiBase() + '/game/jackpot/' + level + '/overview';

    fetch(url).then(function(r) {
      if (!r.ok && r.status !== 404) throw new Error('HTTP ' + r.status);
      if (r.status === 404) return { level: level, day: null, farFutureResolved: false, rows: [] };
      return r.json();
    }).then(function(data) {
      if (token !== joRenderToken) return;
      if (!data || !Array.isArray(data.rows) || data.rows.length === 0) {
        status.className = 'jo-empty';
        status.textContent = 'No jackpot draws for this day.';
        if (ffNote) ffNote.style.display = (data && data.farFutureResolved) ? 'block' : 'none';
        return;
      }
      status.style.display = 'none';
      for (var j = 0; j < data.rows.length; j++) {
        appendOverviewRow(grid, data.rows[j]);
      }
      if (ffNote) ffNote.style.display = data.farFutureResolved ? 'block' : 'none';
    }).catch(function(err) {
      if (token !== joRenderToken) return;
      console.error('[jo] fetch failed', err);
      status.className = 'jo-empty';
      status.textContent = 'Could not load jackpot data. Try advancing to another day.';
      if (ffNote) ffNote.style.display = 'none';
    });
  }

  function appendOverviewRow(grid, row) {
    var isBonus = row.type === 'bonus';

    var typeCell = document.createElement('div');
    typeCell.className = 'jo-type-badge' + (isBonus ? ' jo-bonus' : '');
    if (isBonus) {
      typeCell.textContent = 'Bonus';
    } else {
      var t = row.traitId | 0;
      var q = Math.floor(t / 64);
      var sym = Math.floor((t % 64) / 8);
      var col = t % 8;
      var img = document.createElement('img');
      img.src = joBadgePath(q, sym, col);
      img.alt = JO_SYMBOLS[JO_CATEGORIES[q]][sym];
      typeCell.appendChild(img);
    }

    var winCell = document.createElement('div');
    winCell.className = 'jo-winners';
    winCell.textContent = String(row.winnerCount);

    var uniqCell = document.createElement('div');
    uniqCell.className = 'jo-unique';
    uniqCell.textContent = String(row.uniqueWinnerCount);

    var coinCell = document.createElement('div');
    coinCell.className = 'jo-coin';
    coinCell.textContent = (!row.coinPerWinner || row.coinPerWinner === '0') ? '\u2014' : joFormatCoin(row.coinPerWinner);

    var tktCell = document.createElement('div');
    tktCell.className = 'jo-tickets';
    tktCell.textContent = row.ticketsPerWinner ? String(row.ticketsPerWinner) : '\u2014';

    var ethCell = document.createElement('div');
    ethCell.className = 'jo-eth';
    ethCell.textContent = (!row.ethPerWinner || row.ethPerWinner === '0') ? '\u2014' : joFormatWeiToEth(row.ethPerWinner);

    var spreadCell = document.createElement('div');
    spreadCell.className = 'jo-spread';
    var buckets = Array.isArray(row.spreadBuckets) ? row.spreadBuckets : [false, false, false];
    for (var b = 0; b < 3; b++) {
      var bar = document.createElement('div');
      bar.className = 'jo-spread-bar' + (buckets[b] ? ' active' : '');
      spreadCell.appendChild(bar);
    }

    var rowEl = document.createElement('div');
    rowEl.className = 'jo-row';
    rowEl.appendChild(typeCell);
    rowEl.appendChild(winCell);
    rowEl.appendChild(uniqCell);
    rowEl.appendChild(coinCell);
    rowEl.appendChild(tktCell);
    rowEl.appendChild(ethCell);
    rowEl.appendChild(spreadCell);
    grid.appendChild(rowEl);
  }

  // Fire once on first load.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderJackpotOverview);
  } else {
    renderJackpotOverview();
  }
})();
</script>

</body>
</html>
