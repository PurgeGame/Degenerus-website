<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Degenerus App</title>
  <link rel="stylesheet" href="/shared/nav.css">
  <link rel="stylesheet" href="/beta/styles/base.css">
  <link rel="stylesheet" href="/beta/styles/panels.css">
  <link rel="stylesheet" href="/beta/styles/buttons.css">
  <link rel="stylesheet" href="/beta/styles/status-bar.css">
  <link rel="stylesheet" href="/beta/styles/skeleton.css">
  <link rel="stylesheet" href="/beta/styles/forms.css">
  <link rel="stylesheet" href="/beta/styles/tx-status.css">
  <link rel="stylesheet" href="/beta/styles/jackpot.css">
  <link rel="stylesheet" href="/beta/styles/boons.css">
  <link rel="stylesheet" href="/app/styles/app.css">
  <script type="importmap">
  {
    "imports": {
      "ethers": "https://esm.sh/ethers@6.16.0",
      "gsap": "https://esm.sh/gsap@3.14",
      "gsap/Flip": "https://esm.sh/gsap@3.14/Flip",
      "gsap/TextPlugin": "https://esm.sh/gsap@3.14/TextPlugin",
      "canvas-confetti": "https://esm.sh/canvas-confetti@1.9"
    }
  }
  </script>
</head>
<body>
  <div class="container">
    <!-- Nav injected by shared/nav.js -->

    <!-- Sepolia chip row (Phase 56 ships placeholder; Phase 58 activates state colors) -->
    <div class="chain-chip-row" aria-label="Network status">
      <span id="chain-chip" class="chain-chip chain-chip--neutral">
        <span class="chain-chip__dot"></span>
        <span class="chain-chip__label">Sepolia testnet</span>
      </span>
    </div>

    <!-- Phase 59 last-day jackpot widget (top-of-page hero per D-06; JKP-02 + JKP-03) -->
    <last-day-jackpot></last-day-jackpot>

    <!-- Phase 60 packs panel — first write surface (LBX-01..04 wave) -->
    <app-packs-panel></app-packs-panel>

    <!-- Phase 61 claims panel — multi-prize tray (CLM-01, CLM-03, CLM-04) -->
    <app-claims-panel></app-claims-panel>

    <!-- Phase 62 decimator panel — BUY-01 level-mint (re-export of Phase 60 lootbox.js) -->
    <app-decimator-panel></app-decimator-panel>

    <!-- Phase 62 pass section — BUY-02 + BUY-03 (whale + deity passes) -->
    <app-pass-section></app-pass-section>

    <!-- Phase 62 coinflip panel — BUY-04 (BURNIE coinflip deposit, sync) -->
    <app-coinflip-panel></app-coinflip-panel>

    <!-- Phase 62 degenerette panel — BUY-05 (place → poll RNG → resolve, two-tx) -->
    <app-degenerette-panel></app-degenerette-panel>

    <!-- Phase 62 quest panel — QST-01 + QST-02 (read-only display; quests progress automatically per RESEARCH R4) -->
    <app-quest-panel></app-quest-panel>

    <!-- Phase 62 boons panel — BNS-01 (thin wrapper bridging /beta/ <boons-panel> verbatim cross-import) -->
    <app-boons-panel></app-boons-panel>

    <!-- Page header -->
    <header class="page-header">
      <img class="page-header-logo" src="/badges-circular/flame_red.svg" alt="Degenerus">
      <h1>DEGENERUS APP</h1>
      <p class="subtitle">Play on Sepolia testnet — connect a wallet for purchases.</p>
    </header>

    <!-- Player typeahead (Phase 58 DD-01 consumer; visible whether wallet connected or browsing read-only) -->
    <div class="player-search-row">
      <player-dropdown></player-dropdown>
    </div>

    <!-- View-mode banner (Phase 58 DD-02; view-mode-banner.js targets #view-mode-banner by id and toggles [hidden] via subscribe('ui.mode')) -->
    <div id="view-mode-banner" class="view-mode-banner" hidden>
      <span class="view-mode-banner__text">Viewing read-only</span>
      <button class="view-mode-banner__cta" type="button">Back to my account</button>
    </div>

    <!-- Main panel surface -->
    <main id="app-root">
      <div id="app-loading-state" class="panel app-loading-state">
        <p>Loading testnet state…</p>
      </div>
    </main>

    <footer>
      <p>Degenerus Protocol — Sepolia testnet</p>
    </footer>

    <!-- Wallet picker modal (Phase 58 — hidden by default; show() unhides) -->
    <wallet-picker></wallet-picker>
  </div>

  <script src="/shared/nav.js"></script>
  <script>initNav({ currentPage: 'app' });</script>
  <script type="module" src="/app/app/main.js"></script>
  <script type="module" src="/app/components/wallet-picker.js"></script>
  <script type="module" src="/app/components/player-dropdown.js"></script>
  <script type="module" src="/app/components/view-mode-banner.js"></script>
  <script type="module" src="/app/components/last-day-jackpot.js"></script>
  <script type="module" src="/app/components/app-packs-panel.js"></script>
  <script type="module" src="/app/components/app-claims-panel.js"></script>
  <script type="module" src="/app/components/app-decimator-panel.js"></script>
  <script type="module" src="/app/components/app-pass-section.js"></script>
  <script type="module" src="/app/components/app-coinflip-panel.js"></script>
  <script type="module" src="/app/components/app-degenerette-panel.js"></script>
  <script type="module" src="/app/components/app-quest-panel.js"></script>
  <script type="module" src="/app/components/app-boons-panel.js"></script>
</body>
</html>
