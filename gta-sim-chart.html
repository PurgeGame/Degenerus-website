  var lt = SIM.lt;
  var labels = pools.map(function(_, i) { return String(i + 1); });

  var bounds = [0].concat(lt, [pools.length - 1]);
  var levelLabels = [];
  for (var i = 0; i < bounds.length - 1; i++) {
    var dayIdx = i === 0 ? bounds[i] : Math.min(bounds[i] + 1, pools.length - 1);
    var lvl = pools[dayIdx].lvl;
    levelLabels.push(lvl === 0 ? null : lvl);
  }

  var maxJP = SIM.maxJP;
  var jpBars = maxJP.map(function(j) {
    return { dayIdx: j.l < lt.length ? lt[j.l] : pools.length - 1, value: j.v };
  });

  var txtColor = '#a0a0c0';
  var gridColor = 'rgba(160,160,192,0.1)';

  new Chart(document.getElementById('gta-simChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Next Pool', data: pools.map(function(p) { return p.next; }), borderColor: '#4a9eff', borderWidth: 2, pointRadius: 0, tension: 0.1 },
        { label: 'Future Pool', data: pools.map(function(p) { return p.future; }), borderColor: '#4ade80', borderWidth: 2, pointRadius: 0, tension: 0.1 },
        { label: 'Cumulative Yield', data: pools.map(function(p) { return p.cy; }), borderColor: '#f9a825', backgroundColor: 'rgba(249,168,37,0.12)', borderWidth: 2, pointRadius: 0, tension: 0.1, fill: true },
        { label: 'Largest Jackpot', data: [], borderColor: '#d32f2f', backgroundColor: 'rgba(211,47,47,0.45)', borderWidth: 2, pointRadius: 0, pointStyle: 'rect' }
      ]
    },
    plugins: [
      {
        id: 'levelLines',
        beforeDraw: function(chart) {
          var ctx = chart.ctx, chartArea = chart.chartArea, xScale = chart.scales.x;
          ctx.save();
          for (var k = 0; k < lt.length; k++) {
            var x = xScale.getPixelForValue(lt[k]);
            ctx.strokeStyle = 'rgba(128,128,128,0.35)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();
          }
          ctx.setLineDash([]);
          ctx.fillStyle = txtColor;
          ctx.font = '600 12px -apple-system, sans-serif';
          ctx.textAlign = 'left';
          ctx.fillText('Level', chartArea.left, chartArea.top - 6);
          ctx.font = '10px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          for (var i = 0; i < bounds.length - 1; i++) {
            var mid = (bounds[i] + bounds[i + 1]) / 2;
            var xMid = xScale.getPixelForValue(mid);
            if (levelLabels[i] != null) ctx.fillText(String(levelLabels[i]), xMid, chartArea.top - 6);
          }
          ctx.restore();
        }
      },
      {
        id: 'jackpotBars',
        beforeDraw: function(chart) {
          var ctx = chart.ctx, chartArea = chart.chartArea, xScale = chart.scales.x, yScale = chart.scales.y;
          var bottom = yScale.getPixelForValue(0);
          ctx.save();
          for (var k = 0; k < jpBars.length; k++) {
            var j = jpBars[k];
            var x = xScale.getPixelForValue(j.dayIdx);
            var yTop = yScale.getPixelForValue(j.value);
            ctx.fillStyle = 'rgba(211, 47, 47, 0.45)';
            ctx.fillRect(x - 2, yTop, 4, bottom - yTop);
          }
          ctx.restore();
        }
      }
    ],
    options: {
      responsive: true,
      maintainAspectRatio: true,
      layout: { padding: { top: 18 } },
      scales: {
        y: {
          ticks: { color: txtColor, font: { size: 11 } },
          grid: { color: gridColor },
          title: { display: true, text: 'ETH', color: txtColor, font: { size: 12, weight: '600' } }
        },
        x: {
          title: { display: true, text: 'Day', color: txtColor, font: { size: 12, weight: '600' } },
          ticks: { color: txtColor, font: { size: 11 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 20 },
          grid: { display: false }
        }
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: txtColor, font: { size: 11 }, padding: 10, usePointStyle: true }
        },
        tooltip: { enabled: false }
      }
    }
  });
})();
